name: InfobipCallKitExample
options:
  bundleIdPrefix: com.smartosc.infobip
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:
  # Scene-based host (UISceneDelegate).
  InfobipCallKitExample:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Shared
      - path: InfobipCallKitExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartosc.infobip.callkit.example
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
    info:
      path: InfobipCallKitExample/Info.plist
      properties:
        CFBundleDisplayName: CallKit Example
        NSMicrophoneUsageDescription: "Microphone is used to make and receive calls."
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate

  # Classic host (UIApplicationDelegate only — no UIApplicationSceneManifest).
  InfobipCallKitExampleAppDelegate:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Shared
      - path: AppDelegateExample
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartosc.infobip.callkit.example.appdelegate
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
    info:
      path: AppDelegateExample/Info.plist
      properties:
        CFBundleDisplayName: CallKit Example (AppDelegate)
        NSMicrophoneUsageDescription: "Microphone is used to make and receive calls."
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

schemes:
  InfobipCallKitExample:
    build:
      targets:
        InfobipCallKitExample: all
    run:
      config: Debug
    archive:
      config: Release

  InfobipCallKitExampleAppDelegate:
    build:
      targets:
        InfobipCallKitExampleAppDelegate: all
    run:
      config: Debug
    archive:
      config: Release
